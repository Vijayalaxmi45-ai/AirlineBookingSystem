<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SkyWings Airlines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-plane-departure me-2"></i>SkyWings Admin
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light me-2">Frontend</a>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <h2 class="mb-4">Manage Flights</h2>

            <div class="row">
                <div class="col-lg-6">
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Add Flight</h5>
                            <form id="flightForm">
                                <div class="mb-3">
                                    <label class="form-label">Flight Number</label>
                                    <input class="form-control" id="flightNumber" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Airline</label>
                                    <input class="form-control" id="airline" value="SkyWings Airlines" required>
                                </div>
                                <div class="mb-3 row">
                                    <div class="col">
                                        <label class="form-label">Origin (code)</label>
                                        <input class="form-control" id="origin" value="NYC" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Destination (code)</label>
                                        <input class="form-control" id="destination" value="LAX" required>
                                    </div>
                                </div>
                                <div class="mb-3 row">
                                    <div class="col">
                                        <label class="form-label">Departure (YYYY-MM-DD HH:MM)</label>
                                        <input class="form-control" id="departure" value="2026-04-01 08:00:00" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Arrival (YYYY-MM-DD HH:MM)</label>
                                        <input class="form-control" id="arrival" value="2026-04-01 11:30:00" required>
                                    </div>
                                </div>
                                <div class="mb-3 row">
                                    <div class="col">
                                        <label class="form-label">Seats</label>
                                        <input type="number" class="form-control" id="seats" value="180" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Price</label>
                                        <input type="number" step="0.01" class="form-control" id="price" value="299.00" required>
                                    </div>
                                </div>
                                <button class="btn btn-primary" type="submit">Add Flight</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Existing Flights</h5>
                            <div id="flightsList">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
